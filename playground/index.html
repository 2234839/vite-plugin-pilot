<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pilot Playground</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f9fafb; }
    .container { text-align: center; }
    h1 { margin-bottom: 8px; color: #111827; }
    p { color: #6b7280; margin-bottom: 32px; }
    .links { display: flex; flex-direction: column; gap: 12px; }
    a {
      display: block; padding: 16px 32px; border: 1px solid #e5e7eb; border-radius: 12px;
      text-decoration: none; color: #111827; font-size: 18px; font-weight: 500;
      transition: all 0.15s;
    }
    a:hover { border-color: #3b82f6; color: #3b82f6; box-shadow: 0 2px 8px rgba(59,130,246,0.1); }
    .badge { display: inline-block; font-size: 12px; padding: 2px 8px; border-radius: 999px; background: #eff6ff; color: #3b82f6; margin-left: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Pilot Playground</h1>
    <p>vite-plugin-pilot 测试页面</p>
    <div class="links">
      <a href="/vue/">Vue 3 <span class="badge">推荐</span></a>
      <a href="/react/">React</a>
      <a href="/html/">Vanilla JS</a>
    </div>
  </div>
</body>
</html>
